<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Hub Issue Tracker</title>

    <!-- fav icon -->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main>

        <!-- login section -->
        <section class="max-w-[520px] bg-gray-100 mx-auto h-screen p-4">
            <div class="text-center space-y-2">
                <div class=" flex items-center justify-center">
                    <img src="assets/github-logo.png" alt="">
                </div>
                <h2 class="text-3xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-lg font-medium text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto my-10">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label">Email</label>
                        <input type="email" class="input" placeholder="Email" />
                        <label class="label">Password</label>
                        <input type="password" class="input" placeholder="Password" />
                        <div><a class="link link-hover">Forgot password?</a></div>
                        <button class="btn btn-neutral mt-4">Login</button>
                    </fieldset>
                </div>
            </div>



        </section>

    </main>
</body>

</html>
